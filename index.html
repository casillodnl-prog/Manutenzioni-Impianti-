<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Piano Manutenzione Impianti</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2332;
    --border: #2a3045;
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.15);
    --amber-glow: rgba(245,158,11,0.08);
    --green: #10b981;
    --green-dim: rgba(16,185,129,0.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.15);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.15);
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --caffe: #a78bfa;
    --caffe-dim: rgba(167,139,250,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
    height: 56px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--amber);
    white-space: nowrap;
  }
  .logo span { color: var(--text3); font-size: 16px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #modeToggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    transition: all 0.2s;
  }
  #modeToggle.tech { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 8px; padding: 12px 16px;
    overflow-x: auto; scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    white-space: nowrap;
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    min-width: 70px;
  }
  .stat-chip .num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1; }
  .stat-chip .lbl { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; }
  .stat-chip.ok .num { color: var(--green); }
  .stat-chip.warn .num { color: var(--amber); }
  .stat-chip.danger .num { color: var(--red); }
  .stat-chip.caffe .num { color: var(--caffe); }

  /* FILTERS */
  .filters {
    padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .filter-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .filter-chip.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
  .filter-chip.active.caffe-chip { background: var(--caffe-dim); border-color: var(--caffe); color: var(--caffe); }
  #searchInput {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  #searchInput::placeholder { color: var(--text3); }
  #searchInput:focus { border-color: var(--amber); }

  /* RESULTS COUNT */
  .results-meta {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text3);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sort-btn {
    background: none; border: none; color: var(--text3); font-size: 12px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 4px;
  }
  .sort-btn.active { color: var(--amber); }

  /* CARDS LIST */
  .cards { padding: 0 16px 80px; display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 4px 0 0 4px;
  }
  .card.ok::before { background: var(--green); }
  .card.warn::before { background: var(--amber); }
  .card.danger::before { background: var(--red); }
  .card.caffe-card::before { background: var(--caffe); }
  .card:active { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .card-badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    padding: 3px 8px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
  }
  .badge-ok { background: var(--green-dim); color: var(--green); }
  .badge-warn { background: var(--amber-dim); color: var(--amber); }
  .badge-danger { background: var(--red-dim); color: var(--red); }
  .badge-caffe { background: var(--caffe-dim); color: var(--caffe); }
  .badge-inactive { background: rgba(100,116,139,0.2); color: var(--text3); }

  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .meta-tag {
    font-size: 12px; color: var(--text3);
    display: flex; align-items: center; gap: 4px;
  }
  .meta-tag .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }

  .card-row { display: flex; justify-content: space-between; align-items: center; }
  .card-date { font-size: 13px; }
  .card-date .label { color: var(--text3); font-size: 11px; margin-bottom: 2px; }
  .card-date .value { font-weight: 500; }
  .card-days {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .days-label { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--text3); }

  /* MODAL / DETAIL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 600px;
    max-height: 90vh; overflow-y: auto;
    padding: 20px 20px 40px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 20px;
  }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; margin-bottom: 4px; }
  .modal-subtitle { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
  .modal-section { margin-bottom: 20px; }
  .modal-section h3 { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-item { background: var(--surface2); border-radius: 10px; padding: 10px 12px; }
  .info-item .lbl { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .info-item .val { font-size: 14px; font-weight: 500; }
  .info-item.full { grid-column: 1 / -1; }
  .storia-list { display: flex; flex-direction: column; gap: 0; }
  .storia-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .storia-item:last-child { border-bottom: none; }
  .storia-item .s-num { font-size: 11px; color: var(--text3); width: 24px; text-align: right; flex-shrink: 0; }
  .storia-item .s-date { font-weight: 500; flex: 1; }
  .storia-item .s-note { font-size: 12px; color: var(--text3); background: var(--surface2); padding: 2px 8px; border-radius: 6px; }
  .storia-item.latest { background: var(--amber-glow); border-radius: 8px; padding: 8px 10px; }
  .storia-item.latest .s-date { color: var(--amber); }

  /* EDIT FORM */
  .edit-section { display: none; }
  .edit-section.show { display: block; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px;
    border-radius: 10px; font-size: 14px;
    font-family: 'DM Sans', sans-serif; outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--amber); }
  .form-group select option { background: var(--surface2); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer; border: none;
    font-family: 'DM Sans', sans-serif; transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn-save { background: var(--amber); color: #000; }
  .btn-cancel { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-delete { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); flex: 0 0 auto; padding: 13px 16px; }
  .btn-add-date { width: 100%; background: var(--green-dim); border: 1px solid var(--green); color: var(--green); padding: 11px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-add-date:active { opacity: 0.8; }

  /* ADD NEW BTN */
  #addNewBtn {
    position: fixed; bottom: 20px; right: 16px;
    background: var(--amber); color: #000;
    border: none; border-radius: 50%;
    width: 54px; height: 54px; font-size: 26px;
    cursor: pointer; box-shadow: 0 4px 20px rgba(245,158,11,0.4);
    display: none; align-items: center; justify-content: center;
    z-index: 150; transition: transform 0.15s;
  }
  #addNewBtn:active { transform: scale(0.93); }
  #addNewBtn.visible { display: flex; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }

  /* TAG VIE/CAFFE */
  .type-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 8px;
  }
  .type-birra { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .type-caffe { background: var(--caffe-dim); color: var(--caffe); }

  /* LOADING */
  .loading { text-align: center; padding: 40px; color: var(--text3); }

  @media (min-width: 480px) {
    .cards { padding: 0 20px 80px; }
    .filters { padding: 12px 20px; }
    header { padding: 0 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🍺 Manutenzioni <span>// Impianti</span></div>
  <div class="header-right">
    <button id="modeToggle" onclick="toggleMode()">👁 Sola lettura</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="filters">
  <input id="searchInput" type="search" placeholder="🔍 Cerca esercizio, cliente, località..." oninput="applyFilters()">
  <div class="filter-row" id="agentiFilter"></div>
  <div class="filter-row" id="localitaFilter"></div>
  <div class="filter-row" id="typeFilter"></div>
</div>

<div class="results-meta">
  <span id="resultsCount">–</span>
  <button class="sort-btn" id="sortBtn" onclick="cycleSort()">
    <span id="sortLabel">Ordina: Più vecchi</span> ▼
  </button>
</div>

<div class="cards" id="cardsList"></div>

<button id="addNewBtn" onclick="openAddNew()">＋</button>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalContent">
    <div class="modal-handle"></div>
    <div id="modalBody"></div>
  </div>
</div>

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let techMode = false;
let filterAgente = 'tutti';
let filterLocalita = 'tutte';
let filterType = 'tutti';
let sortMode = 0; // 0=old first, 1=new first, 2=name
let searchQuery = '';
let selectedItem = null;
let editingItem = null;

const SORT_MODES = ['Più vecchi prima', 'Più recenti prima', 'Nome A-Z'];
const TODAY = new Date('2026-04-03');

function daysSince(dateStr) {
  if (!dateStr) return 9999;
  const d = new Date(dateStr);
  if (isNaN(d)) return 9999;
  return Math.floor((TODAY - d) / 86400000);
}

function statusOf(item) {
  if (item.vie_caffe && item.vie_caffe.toUpperCase().includes('CAFFE')) return 'caffe';
  const days = daysSince(item.ultimo_intervento);
  if (days > 120) return 'danger';
  if (days > 70) return 'warn';
  return 'ok';
}

function formatDate(str) {
  if (!str) return '–';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function isCaffe(item) {
  return item.vie_caffe && item.vie_caffe.toUpperCase().includes('CAFFE');
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
  buildFilters();
  buildStats();
  applyFilters();
}

function buildFilters() {
  const agenti = [...new Set(DB.map(d => d.agente).filter(Boolean))].sort();
  const localita = [...new Set(DB.map(d => d.localita).filter(Boolean))].sort();

  const af = document.getElementById('agentiFilter');
  af.innerHTML = `<button class="filter-chip active" onclick="setAgente('tutti', this)">Tutti gli agenti</button>` +
    agenti.map(a => `<button class="filter-chip" onclick="setAgente('${a}', this)">${a}</button>`).join('');

  const lf = document.getElementById('localitaFilter');
  lf.innerHTML = `<button class="filter-chip active" onclick="setLocalita('tutte', this)">Tutte le località</button>` +
    localita.map(l => `<button class="filter-chip" onclick="setLocalita('${encodeURIComponent(l)}', this)">${l}</button>`).join('');

  const tf = document.getElementById('typeFilter');
  tf.innerHTML = `<button class="filter-chip active" onclick="setType('tutti', this)">Tutti</button>
    <button class="filter-chip" onclick="setType('birra', this)">🍺 VIE Birra</button>
    <button class="filter-chip caffe-chip" onclick="setType('caffe', this)">☕ Caffè</button>
    <button class="filter-chip" onclick="setType('danger', this)">🔴 Scaduti (+120gg)</button>
    <button class="filter-chip" onclick="setType('warn', this)">🟡 In scadenza (+70gg)</button>`;
}

function buildStats() {
  const ok = DB.filter(d => statusOf(d) === 'ok').length;
  const warn = DB.filter(d => statusOf(d) === 'warn').length;
  const danger = DB.filter(d => statusOf(d) === 'danger').length;
  const caffe = DB.filter(d => isCaffe(d)).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip"><div class="num" style="color:var(--text)">${DB.length}</div><div class="lbl">TOTALE</div></div>
    <div class="stat-chip ok"><div class="num">${ok}</div><div class="lbl">OK</div></div>
    <div class="stat-chip warn"><div class="num">${warn}</div><div class="lbl">ATTENZIONE</div></div>
    <div class="stat-chip danger"><div class="num">${danger}</div><div class="lbl">SCADUTI</div></div>
    <div class="stat-chip caffe"><div class="num">${caffe}</div><div class="lbl">CAFFÈ</div></div>`;
}

function setAgente(val, btn) {
  filterAgente = val;
  document.querySelectorAll('#agentiFilter .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setLocalita(val, btn) {
  filterLocalita = val;
  document.querySelectorAll('#localitaFilter .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setType(val, btn) {
  filterType = val;
  document.querySelectorAll('#typeFilter .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (val === 'caffe') btn.classList.add('caffe-chip');
  applyFilters();
}

function cycleSort() {
  sortMode = (sortMode + 1) % 3;
  document.getElementById('sortLabel').textContent = 'Ordina: ' + SORT_MODES[sortMode];
  const btn = document.getElementById('sortBtn');
  btn.classList.toggle('active', sortMode !== 0);
  applyFilters();
}

function applyFilters() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  let filtered = DB.filter(item => {
    if (filterAgente !== 'tutti' && item.agente !== filterAgente) return false;
    if (filterLocalita !== 'tutte' && decodeURIComponent(filterLocalita) !== item.localita) return false;
    if (filterType === 'birra' && isCaffe(item)) return false;
    if (filterType === 'caffe' && !isCaffe(item)) return false;
    if (filterType === 'danger' && statusOf(item) !== 'danger') return false;
    if (filterType === 'warn' && statusOf(item) !== 'warn') return false;
    if (searchQuery) {
      const hay = (item.esercizio + item.cliente + item.localita + item.agente + item.note).toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });

  if (sortMode === 0) filtered.sort((a,b) => daysSince(b.ultimo_intervento) - daysSince(a.ultimo_intervento));
  else if (sortMode === 1) filtered.sort((a,b) => daysSince(a.ultimo_intervento) - daysSince(b.ultimo_intervento));
  else filtered.sort((a,b) => a.esercizio.localeCompare(b.esercizio));

  renderCards(filtered);
  document.getElementById('resultsCount').textContent = `${filtered.length} impianti trovati`;
}

function renderCards(items) {
  const container = document.getElementById('cardsList');
  if (!items.length) {
    container.innerHTML = '<div class="empty"><div class="icon">🔍</div><div>Nessun impianto trovato</div></div>';
    return;
  }

  container.innerHTML = items.map(item => {
    const st = statusOf(item);
    const days = daysSince(item.ultimo_intervento);
    const isCaf = isCaffe(item);
    const cardClass = isCaf ? 'caffe-card' : st;

    let badgeHtml = '';
    if (isCaf) {
      badgeHtml = `<span class="card-badge badge-caffe">☕ CAFFÈ</span>`;
    } else if (st === 'ok') {
      badgeHtml = `<span class="card-badge badge-ok">✓ OK</span>`;
    } else if (st === 'warn') {
      badgeHtml = `<span class="card-badge badge-warn">⚠ ATTENZIONE</span>`;
    } else {
      badgeHtml = `<span class="card-badge badge-danger">✕ SCADUTO</span>`;
    }

    const daysColor = days > 120 ? 'var(--red)' : days > 70 ? 'var(--amber)' : 'var(--green)';
    const typeTag = isCaf
      ? `<span class="type-tag type-caffe">☕ Caffè</span>`
      : item.vie_caffe ? `<span class="type-tag type-birra">🍺 VIE ${item.vie_caffe}</span>` : '';

    return `<div class="card ${cardClass}" onclick="openDetail('${item.id}')">
      <div class="card-header">
        <div class="card-title">${item.esercizio}</div>
        ${badgeHtml}
      </div>
      <div class="card-meta">
        <span class="meta-tag">📍 ${item.localita}</span>
        <span class="meta-tag"><div class="dot"></div>${item.agente}</span>
        ${typeTag}
        ${item.note ? `<span class="meta-tag">📝 ${item.note.substring(0,30)}</span>` : ''}
      </div>
      <div class="card-row">
        <div class="card-date">
          <div class="label">Ultimo intervento</div>
          <div class="value">${formatDate(item.ultimo_intervento)}</div>
        </div>
        <div>
          <div class="card-days" style="color:${daysColor}">${days < 9999 ? days : '–'}</div>
          <div class="days-label">giorni fa</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// DETAIL MODAL
// ═══════════════════════════════════════════════
function openDetail(id) {
  selectedItem = DB.find(d => d.id === id);
  if (!selectedItem) return;
  renderModal(selectedItem, false);
  document.getElementById('modalOverlay').classList.add('open');
}

function renderModal(item, editing) {
  const st = statusOf(item);
  const days = daysSince(item.ultimo_intervento);
  const isCaf = isCaffe(item);

  let viewHtml = `
    <div class="modal-title">${item.esercizio}</div>
    <div class="modal-subtitle">${item.cliente || ''} · ${item.localita}</div>
    <div class="modal-section">
      <h3>Dettagli impianto</h3>
      <div class="info-grid">
        <div class="info-item"><div class="lbl">Codice</div><div class="val">${item.id}</div></div>
        <div class="info-item"><div class="lbl">Agente</div><div class="val">${item.agente}</div></div>
        <div class="info-item"><div class="lbl">Tipo impianto</div><div class="val">${isCaf ? '☕ Macchina Caffè' : '🍺 Impianto Birra' + (item.vie_caffe ? ' (VIE ' + item.vie_caffe + ')' : '')}</div></div>
        <div class="info-item"><div class="lbl">Proprietà</div><div class="val">${item.proprieta || '–'}</div></div>
        <div class="info-item"><div class="lbl">Posizione km</div><div class="val">${item.posizione || '–'}</div></div>
        <div class="info-item"><div class="lbl">Giorno chiusura</div><div class="val">${item.gg_chiusura || '–'}</div></div>
        ${item.note ? `<div class="info-item full"><div class="lbl">Note</div><div class="val">${item.note}</div></div>` : ''}
        <div class="info-item"><div class="lbl">Ultimo intervento</div><div class="val" style="color:${days>120?'var(--red)':days>70?'var(--amber)':'var(--green)'}">${formatDate(item.ultimo_intervento)}</div></div>
        <div class="info-item"><div class="lbl">Giorni fa</div><div class="val" style="color:${days>120?'var(--red)':days>70?'var(--amber)':'var(--green)'};font-family:'Bebas Neue';font-size:28px">${days < 9999 ? days : '–'}</div></div>
      </div>
    </div>
    <div class="modal-section">
      <h3>Storico interventi (${item.storico.length})</h3>
      <div class="storia-list">
        ${item.storico.map((s, i) => {
          const isDate = /^\d{4}-\d{2}-\d{2}$/.test(s);
          const isLatest = s === item.ultimo_intervento;
          return `<div class="storia-item ${isLatest ? 'latest' : ''}">
            <span class="s-num">${i+1}</span>
            ${isDate ? `<span class="s-date">${formatDate(s)}</span>` : `<span class="s-date" style="color:var(--text3)">${s}</span>`}
            ${isLatest ? '<span class="s-note">ultimo</span>' : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;

  if (techMode) {
    viewHtml += `
      <div class="btn-row">
        <button class="btn btn-save" onclick="startEdit()">✏️ Modifica</button>
        <button class="btn btn-cancel" onclick="closeModal()">Chiudi</button>
      </div>`;
  } else {
    viewHtml += `<div class="btn-row"><button class="btn btn-cancel" onclick="closeModal()">Chiudi</button></div>`;
  }

  const agenti = [...new Set(DB.map(d => d.agente).filter(Boolean))].sort();
  const editHtml = `
    <div class="edit-section ${editing ? 'show' : ''}" id="editSection">
      <div class="form-grid">
        <div class="form-group">
          <label>Codice</label>
          <input id="e_id" value="${item.id}">
        </div>
        <div class="form-group">
          <label>Agente</label>
          <select id="e_agente">
            ${agenti.map(a => `<option ${a===item.agente?'selected':''}>${a}</option>`).join('')}
            <option value="NUOVO">+ Nuovo agente</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Esercizio</label><input id="e_esercizio" value="${item.esercizio}"></div>
      <div class="form-group"><label>Cliente</label><input id="e_cliente" value="${item.cliente}"></div>
      <div class="form-grid">
        <div class="form-group"><label>Località</label><input id="e_localita" value="${item.localita}"></div>
        <div class="form-group"><label>Posizione km</label><input id="e_posizione" value="${item.posizione}"></div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Tipo</label>
          <select id="e_tipo">
            <option value="" ${!item.vie_caffe?'selected':''}>Birra (senza VIE)</option>
            <option value="1" ${item.vie_caffe==='1'?'selected':''}>Birra VIE 1</option>
            <option value="2" ${item.vie_caffe==='2'?'selected':''}>Birra VIE 2</option>
            <option value="3" ${item.vie_caffe==='3'?'selected':''}>Birra VIE 3</option>
            <option value="4" ${item.vie_caffe==='4'?'selected':''}>Birra VIE 4</option>
            <option value="5" ${item.vie_caffe==='5'?'selected':''}>Birra VIE 5</option>
            <option value="CAFFE'" ${item.vie_caffe&&item.vie_caffe.toUpperCase().includes('CAFFE')?'selected':''}>☕ Caffè</option>
          </select>
        </div>
        <div class="form-group"><label>Proprietà</label><input id="e_proprieta" value="${item.proprieta}"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>Giorno chiusura</label><input id="e_chiusura" value="${item.gg_chiusura}"></div>
        <div class="form-group"><label>Note</label><input id="e_note" value="${item.note}"></div>
      </div>
      <div class="form-group">
        <label>Aggiungi data intervento</label>
        <input type="date" id="e_newdate" style="margin-bottom:8px">
        <button class="btn-add-date" onclick="addDateToItem()">+ Registra intervento</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-save" onclick="saveEdit()">💾 Salva</button>
        <button class="btn btn-cancel" onclick="cancelEdit()">Annulla</button>
        <button class="btn btn-delete" onclick="deleteItem('${item.id}')">🗑</button>
      </div>
    </div>`;

  document.getElementById('modalBody').innerHTML = viewHtml + editHtml;
}

function startEdit() {
  document.getElementById('editSection').classList.add('show');
  const today = TODAY.toISOString().split('T')[0];
  document.getElementById('e_newdate').value = today;
}

function cancelEdit() {
  document.getElementById('editSection').classList.remove('show');
}

function addDateToItem() {
  const d = document.getElementById('e_newdate').value;
  if (!d) return alert('Seleziona una data');
  if (!selectedItem.storico.includes(d)) {
    selectedItem.storico.push(d);
    const validDates = selectedItem.storico.filter(s => /^\d{4}-\d{2}-\d{2}$/.test(s));
    if (validDates.length) selectedItem.ultimo_intervento = validDates.sort().reverse()[0];
  }
  alert('Data aggiunta! Salva per confermare.');
}

function saveEdit() {
  if (!selectedItem) return;
  selectedItem.id = document.getElementById('e_id').value.trim();
  selectedItem.agente = document.getElementById('e_agente').value;
  selectedItem.esercizio = document.getElementById('e_esercizio').value.trim();
  selectedItem.cliente = document.getElementById('e_cliente').value.trim();
  selectedItem.localita = document.getElementById('e_localita').value.trim();
  selectedItem.posizione = document.getElementById('e_posizione').value.trim();
  selectedItem.vie_caffe = document.getElementById('e_tipo').value;
  selectedItem.proprieta = document.getElementById('e_proprieta').value.trim();
  selectedItem.gg_chiusura = document.getElementById('e_chiusura').value.trim();
  selectedItem.note = document.getElementById('e_note').value.trim();

  // Recalc ultimo_intervento
  const validDates = selectedItem.storico.filter(s => /^\d{4}-\d{2}-\d{2}$/.test(s));
  if (validDates.length) selectedItem.ultimo_intervento = validDates.sort().reverse()[0];

  buildFilters();
  buildStats();
  applyFilters();
  closeModal();
}

function deleteItem(id) {
  if (!confirm('Eliminare questo impianto?')) return;
  DB = DB.filter(d => d.id !== id);
  buildFilters();
  buildStats();
  applyFilters();
  closeModal();
}

function openAddNew() {
  selectedItem = {
    id: 'NEW' + Date.now(),
    agente: '', esercizio: '', cliente: '', posizione: '',
    localita: '', gg_chiusura: '', proprieta: '', vie_caffe: '',
    note: '', storico: [], ultimo_intervento: ''
  };
  DB.push(selectedItem);
  renderModal(selectedItem, true);
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  selectedItem = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function toggleMode() {
  techMode = !techMode;
  const btn = document.getElementById('modeToggle');
  btn.textContent = techMode ? '🔧 Modalità Tecnico' : '👁 Sola lettura';
  btn.classList.toggle('tech', techMode);
  const fab = document.getElementById('addNewBtn');
  fab.classList.toggle('visible', techMode);
}

init();
</script>
</body>
</html>
